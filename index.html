<script>
    const textElement = document.getElementById('typing-text');
    const text = "أهلاً بك في منصتي الرقمية. استكشف المعرفة، الفكر، والعلوم في مدونتي الرسمية.";
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            textElement.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 60);
        }
    }
    window.onload = typeWriter;
</script>
